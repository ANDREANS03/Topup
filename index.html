<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andreams Game Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* SEMUA HALAMAN */
.page {
    display: none;
}

/* AKTIF */
.active {
    display: block;
}

/* LOGIN */
.container {
    max-width: 360px;
    margin: auto;
    padding: 20px;
}

.logo {
    text-align: center;
    margin: 40px 0;
}

.logo img {
    width: 200px;
}

h1 {
    text-align: left;
}

input {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #ddd;
    margin-top: 10px;
}

.btn {
    width: 100%;
    padding: 15px;
    margin-top: 30px;
    background: #f4b400;
    border: none;
    border-radius: 12px;
    font-size: 18px;
}

/* HOME */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.menu {
    display: flex;
    justify-content: space-around;
    background: #0f3b66;
    color: #f4b400;
    margin: 15px;
    border-radius: 30px;
    padding: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: #0f3b66;
    border-radius: 20px;
    padding: 10px;
    color: #f4b400;
}

.card img {
    width: 100%;
    border-radius: 15px;
}

.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #f4b400;
    display: flex;
    justify-content: space-around;
    padding: 15px;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="page active">
    <div class="container">
        <div class="logo">
            <img src="Logo.png">
        </div>

        <h1>Masuk</h1>
        <p>Masuk dengan akun yang telah kamu daftarkan</p>

        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button class="btn" onclick="login()">Masuk</button>
    </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page">
    
    <div class="header">
        <b>Andreans <span style="color:#f4b400">Game Store</span></b>
        🔍
    </div>

    <div style="padding:15px;">
        <img src="Banner.png" style="width:100%; border-radius:15px;">
    </div>

    <div class="menu">
        <div>Populer</div>
        <div>Top Up</div>
        <div>Pulsa</div>
        <div>Voucher</div>
    </div>

    <div class="grid">
        <div class="card">
            <img src="MLBB.jpeg">
            <h3>Mobile Legend</h3>
            <p>Moonton</p>
        </div>

        <div class="card">
            <img src="HOK.jpeg">
            <h3>Honor Of Kings</h3>
            <p>Tencent</p>
        </div>
    </div>

    <div class="navbar">
        🏠 🎮 📊 👤
    </div>

</div>

<script>
function login() {
    // langsung pindah halaman
    document.getElementById("loginPage").classList.remove("active");
    document.getElementById("homePage").classList.add("active");
}
</script>

</body>
</html>
